name: internal-validation

# Workflow-YAML validator. Ensures every workflow under `.github/workflows`
# is syntactically valid and matches the GitHub Actions schema before a
# real build / test runner has a chance to choke on it.
#
# Triggers are deliberately limited to:
#   - `workflow_dispatch`   - manual / ad-hoc validation
#   - `repository_dispatch` - acknowledged but currently parked behind a
#                             `dispatch-gate` (see TODO below). The
#                             payload is still printed for relay-wiring
#                             observability; no validation work runs.
#
# `pull_request` / `push` triggers are intentionally omitted - we only
# want this surface to react to manual runs or relay events.

on:
  workflow_dispatch:
  repository_dispatch:

concurrency:
  group: internal-validation-${{ github.event.client_payload.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # repository_dispatch arm - currently a no-op.
  #
  # TODO(dispatch-gate): re-enable real validation on repository_dispatch by
  # removing this job's `if:` guard (and lifting the corresponding guard on
  # the `yaml` job). Until then we only acknowledge the dispatch and print
  # the payload, so the upstream relay can confirm wiring without us burning
  # a runner on validation work.
  # ===========================================================================
  inspect-dispatch:
    name: inspect relay dispatch (parked)
    if: github.event_name == 'repository_dispatch'
    runs-on: [rtx-build]
    timeout-minutes: 5
    steps:
      - name: Checkout pytorch-oot-internal (for composite actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Inspect repository_dispatch event
        uses: ./.github/actions/inspect-dispatch-event

      - name: Note parked state
        shell: bash
        run: |
          echo "::notice title=dispatch-gate::repository_dispatch event acknowledged; downstream validation is paused. Remove the dispatch-gate guards in .github/workflows/ to re-enable."

  # ===========================================================================
  # Real validation arm - ad-hoc only while the dispatch gate is in place.
  # ===========================================================================
  yaml:
    name: validate workflow YAML
    # TODO(dispatch-gate): remove this guard to let repository_dispatch
    # exercise the real validator again.
    if: github.event_name != 'repository_dispatch'
    runs-on: [rtx-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install validators
        shell: bash
        run: |
          python -m pip install --user --quiet "PyYAML>=6" "check-jsonschema>=0.29"

      - name: YAML syntax check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys, pathlib, yaml
          bad = 0
          for p in pathlib.Path(".github").rglob("*.yml"):
              try:
                  yaml.safe_load(p.read_text(encoding="utf-8"))
                  print(f"OK   {p}")
              except yaml.YAMLError as e:
                  print(f"FAIL {p}: {e}", file=sys.stderr)
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      - name: Validate workflow schema
        shell: bash
        run: |
          check-jsonschema --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml
