name: _rtx-test

# Reusable Windows RTX test workflow. Two install paths, one set of
# downstream steps:
#
#   A) artifact path  - the wheel is a producer-uploaded artifact from
#                       `_rtx-build.yml`; SHA travels alongside the
#                       wheel in `built_pytorch_sha.txt`. Used by
#                       `windows-rtx-build-test.yml`.
#   B) pip-index path - the wheel is already on a public pip index
#                       (download.pytorch.org/whl/nightly/torch/). The
#                       orchestrator passes a `pytorch-ref` (typically
#                       a branch like `nightly`); `actions/checkout@v7`
#                       resolves it to a concrete commit, this workflow
#                       reads the commit's UTC date, greps the index
#                       for a wheel whose filename carries that exact
#                       `devYYYYMMDD` tag together with the matrix
#                       `cu<label>` / `cp<pyshort>` tags, and installs
#                       the resolved URL directly. The job fails fast
#                       if the index has no wheel for that date
#                       (i.e. the wheel for the source we just checked
#                       out is not yet published). Used by
#                       `windows-rtx-wheel-test.yml`.
#
# Exactly one path must be selected per call: set `wheel-artifact`
# (path A) or `pytorch-ref` (path B).
#
# Each invocation is one (config x arch) test cell. Sharding is an
# internal fanout: `strategy.matrix.shard` below spawns 5 parallel
# runners under this single workflow call, and the test step exports
# `SHARD_NUMBER` (per-cell) / `NUM_TEST_SHARDS` (constant 5) /
# `TEST_CONFIG` so `.ci/pytorch/win-test.sh` (which delegates to
# `test/run_test.py`) runs only its slice. The orchestrator therefore
# sees one cell per (config x arch), not one cell per shard - matching
# the upstream `_win-rtx-test.yml` pattern in pytorch/pytorch PR
# #176678 where the test job's `test-matrix` JSON carries the shard
# fanout internally.
#
# A lightweight runner-diagnostics monitor samples host + GPU metrics
# in the background while the test step runs in the foreground, so OOT
# failures can be triaged against an accurate picture of the machine.

on:
  workflow_call:
    inputs:
      runner-base:
        description: "Base runner label for the test pool (e.g. rtx-40x0-test)."
        type: string
        required: true
      python-version:
        description: "Python version in dotted form (e.g. 3.12)."
        type: string
        required: true
      python-label:
        description: "Python label used in runner labels (e.g. py312)."
        type: string
        required: true
      cuda-version:
        description: "CUDA toolkit version in dotted form (e.g. 13.0)."
        type: string
        required: true
      cuda-label:
        description: "CUDA label used in runner labels (e.g. cu130)."
        type: string
        required: true
      cuda-arch-list:
        description: >
          Target SM for TORCH_CUDA_ARCH_LIST in the test step (e.g. '8.9'
          for sm89 / RTX 40x0, '12.0' for sm120 / RTX 50x0). The wheel
          itself may be multi-arch; this just tells the test runner which
          arch to exercise.
        type: string
        required: true
      arch-name:
        description: "Architecture token (e.g. 'sm89', 'sm120'); used for the test-architectures filter."
        type: string
        required: true
      build-environment:
        description: "Logical name passed through as BUILD_ENVIRONMENT."
        type: string
        required: true

      # ---- Sharding (matches pytorch/pytorch PR #176678) --------------
      # The shard fanout is internal to this workflow: each invocation
      # spawns 5 parallel shard runners via `strategy.matrix.shard`
      # below. The caller does NOT see shards in its own matrix - one
      # call to this reusable workflow == one (config x arch) test
      # cell, period. To change the shard count, edit both the
      # `shard:` list under `strategy.matrix` and the `NUM_TEST_SHARDS`
      # env in the test step.
      test-config:
        description: "Test-config name forwarded as TEST_CONFIG (e.g. 'default')."
        type: string
        required: false
        default: "default"

      # ---- Path A: artifact-driven (source build) ---------------------
      wheel-artifact:
        description: "Artifact name carrying wheel + built_pytorch_sha.txt. Mutually exclusive with pytorch-ref."
        type: string
        required: false
        default: ""

      # ---- Path B: pip-index-driven (nightly wheel) -------------------
      pytorch-ref:
        description: "pytorch/pytorch ref to checkout (branch, tag, or SHA). Required when wheel-artifact is empty."
        type: string
        required: false
        default: ""
      wheel-index-url:
        description: "Nightly wheel index page (PEP 503 simple index). The resolver greps this for a wheel whose filename matches the checked-out commit's date and the matrix cuda + python tags."
        type: string
        required: false
        default: "https://download.pytorch.org/whl/nightly/torch/"

      # ---- workflow_dispatch matrix filters ---------------------------
      # The caller cannot reference `matrix.*` in its own job-level
      # `if:` (GitHub Actions restricts that context for reusable-
      # workflow-calling jobs), so the per-cell filter is evaluated
      # here instead, against this invocation's own `python-version` /
      # `cuda-version` / `arch-name` inputs. Empty string disables the
      # corresponding filter dimension.
      python-versions:
        description: "Comma-separated allowlist of python versions; empty = no filter."
        type: string
        required: false
        default: ""
      cuda-versions:
        description: "Comma-separated allowlist of CUDA toolkit versions; empty = no filter."
        type: string
        required: false
        default: ""
      test-architectures:
        description: "Comma-separated allowlist of arch tokens (e.g. 'sm89,sm120'); empty = no filter."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: test (shard ${{ matrix.shard }}/5)
    if: >
      (inputs.python-versions == '' || contains(inputs.python-versions, inputs.python-version))
      && (inputs.cuda-versions == '' || contains(inputs.cuda-versions, inputs.cuda-version))
      && (inputs.test-architectures == '' || contains(inputs.test-architectures, inputs.arch-name))
    strategy:
      fail-fast: false
      matrix:
        # TEMP-DEBUG: single shard only (was [1, 2, 3, 4, 5]) so one runner
        # runs the targeted cpp_extension subset below. Revert to the full
        # list when done debugging the MAX_PATH fix.
        shard: [1]
    runs-on:
      - ${{ inputs.runner-base }}
      - ${{ inputs.python-label }}
      - ${{ inputs.cuda-label }}
    timeout-minutes: 210
    env:
      # ---- carried from the matrix cell -------------------------------
      BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
      PYTHON_VERSION: ${{ inputs.python-version }}
      CUDA_VERSION: ${{ inputs.cuda-version }}
      TORCH_CUDA_ARCH_LIST: ${{ inputs.cuda-arch-list }}
      # ---- pytorch CI knobs (subset of pytorch/pytorch PR #176678) ----
      USE_CUDA: "1"
      # Runner image already carries the Windows SDK and VS BuildTools;
      # tell win-test.sh not to re-install them.
      INSTALL_WINDOWS_SDK: "0"
      # Don't stop the whole shard on the first test failure - we want
      # the full pass/fail picture per shard.
      CONTINUE_THROUGH_ERROR: "1"
      VC_PRODUCT: "BuildTools"
      VC_YEAR: "2022"
      VS_VERSION: "17.4.1"
      VC_VERSION: ""
      PYTORCH_TEST_WITH_SLOW: "0"
      CI: "1"
      # Short physical path the pytorch checkout is relocated to right after
      # checkout. The runner workspace lives at
      #   C:\actions-runner\_work\pytorch-windows-ci\pytorch-windows-ci\pytorch
      # (the repo name is doubled), so test-time cpp_extension builds write
      # object/dep files ~290 chars deep and blow past Windows MAX_PATH (260).
      # Relocating to C:\pt strips ~60 chars off every derived path. See the
      # "Relocate pytorch checkout" step for the full rationale.
      PT_ROOT: 'C:\pt'
    steps:
      - name: Validate install-path inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.wheel-artifact }}" ]; then
            echo "install path: artifact (${{ inputs.wheel-artifact }})"
          elif [ -n "${{ inputs.pytorch-ref }}" ]; then
            echo "install path: pip-index"
            echo "  pytorch-ref:     ${{ inputs.pytorch-ref }}"
            echo "  wheel-index-url: ${{ inputs.wheel-index-url }}"
          else
            echo "::error::Either 'wheel-artifact' or 'pytorch-ref' must be set." >&2
            exit 1
          fi

      # Let git use the \\?\ extended-length prefix so the deep recursive
      # submodule checkout of pytorch/pytorch (third_party/.../pybind11/...)
      # never trips the 260-char MAX_PATH during `git checkout`. No admin
      # needed (--global writes the runner user's gitconfig), unlike the
      # registry LongPathsEnabled flag. This covers `git` itself; the
      # MAX_PATH that the test-time compilers (cl/nvcc) hit is handled
      # separately by relocating the checkout to C:\pt (see that step).
      - name: Enable git long paths
        shell: bash
        run: git config --global core.longpaths true

      - name: Checkout repository (runner-diagnostics actions)
        uses: actions/checkout@v7
        with:
          path: oot
          show-progress: false

      # TEMP-DEBUG: run the test-summary parser's own unit tests on the runner
      # so this debug run also validates the rerun fail->pass reconciliation
      # (incl. the xdist result-first PASSED case that wrongly listed a green
      # shard's flaky test). Deterministic and fast - independent of torch, so
      # it runs before the wheel install. Revert by deleting this step.
      - name: 'TEMP-DEBUG: validate test-summary parser (rerun fail->pass fix)'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -q pytest
          python -m pytest -v \
            "${GITHUB_WORKSPACE}/oot/scripts/test-summary/tests/test_parse_failures.py"

      # Pull the wheel + SHA produced by the paired build job from GitHub
      # Actions artifact storage. Lands files under `artifact/...`.
      - name: Download wheel artifact
        if: inputs.wheel-artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.wheel-artifact }}
          path: artifact

      - name: Resolve pytorch ref to check out
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.wheel-artifact }}" ]; then
            ref=$(tr -d '[:space:]' < artifact/built_pytorch_sha.txt)
            if ! [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Invalid SHA in artifact: '$ref'" >&2
              exit 1
            fi
          else
            ref="${{ inputs.pytorch-ref }}"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "checkout ref: $ref"

      - name: Checkout pytorch/pytorch at the resolved ref
        uses: actions/checkout@v7
        with:
          repository: pytorch/pytorch
          ref: ${{ steps.ref.outputs.ref }}
          path: pytorch
          submodules: recursive
          fetch-depth: 1
          show-progress: true

      # Windows MAX_PATH (260) mitigation, root cause fix. The runner image
      # already sets the LongPathsEnabled registry flag (packer
      # win_build_setup/tools.ps1), but that does NOT help the test-time
      # cpp_extension builds (test_libtorch_agnostic, test_python_agnostic,
      # ...): nvcc does not support paths over MAX_PATH at all (per the CUDA
      # docs), and cl's long-path opt-in does not cover every output path the
      # ninja/setuptools build constructs. setuptools writes each object to
      #   <ext>\build\temp.win-amd64-cpython-312\Release\<ABSOLUTE-SOURCE-PATH>
      # i.e. the already-deep workspace path doubled, so cl fails "C1083:
      # Cannot open compiler generated file" and nvcc "Could not open output
      # file ...obj.d". The only reliable fix is a genuinely SHORTER physical
      # path - not a `subst` alias, which setuptools' os.path.realpath()
      # canonicalises straight back to the long physical path.
      #
      # So move the whole checkout out of the doubled-name workspace into
      # C:\pt. Same-volume `move` is an atomic rename (no per-file MAX_PATH
      # traversal), pytorch's submodule .git links are relative so they stay
      # valid, and win-test.sh derives PROJECT_DIR/TMP_DIR/TEST_DIR purely
      # from $PWD (it never reads $GITHUB_WORKSPACE), so running the harness
      # from C:\pt shortens every downstream object/dep path for real. C:\pt
      # lives outside the workspace, so clear any leftover from a previous job
      # on this persistent runner first (robocopy /MIR empties deep trees
      # without itself hitting MAX_PATH).
      - name: Relocate pytorch checkout to a short path (MAX_PATH mitigation)
        shell: cmd
        run: |
          if exist "%PT_ROOT%" (
            mkdir "%PT_ROOT%_empty" 2>nul
            robocopy "%PT_ROOT%_empty" "%PT_ROOT%" /MIR /NFL /NDL /NJH /NJS /NP >nul
            rmdir /s /q "%PT_ROOT%"
            rmdir /s /q "%PT_ROOT%_empty"
          )
          move "%GITHUB_WORKSPACE%\pytorch" "%PT_ROOT%"
          if errorlevel 1 (
            echo ::error::Failed to relocate pytorch checkout to %PT_ROOT%
            exit /b 1
          )
          echo Relocated pytorch checkout to %PT_ROOT%

      - name: Record pytorch HEAD (SHA + commit date)
        id: head
        shell: bash
        working-directory: ${{ env.PT_ROOT }}
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          date_iso=$(git log -1 --format=%cI HEAD)
          # Force UTC so the YYYYMMDD matches the wheel's `devYYYYMMDD` tag,
          # which pytorch CI mints from the UTC build date.
          date_ymd=$(TZ=UTC git log -1 --date=format-local:%Y%m%d --format=%cd HEAD)
          {
            echo "## pytorch checkout"
            echo ""
            echo "| field      | value |"
            echo "| ---        | --- |"
            echo "| input ref  | \`${{ steps.ref.outputs.ref }}\` |"
            echo "| HEAD sha   | \`$sha\` |"
            echo "| committed  | \`$date_iso\` |"
            echo "| dev tag    | \`dev$date_ymd\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "date_ymd=$date_ymd" >> "$GITHUB_OUTPUT"
          echo "pytorch HEAD: $sha @ $date_iso (dev$date_ymd)"

      - name: Resolve nightly wheel URL for this cell
        if: inputs.wheel-artifact == ''
        id: wheel
        shell: bash
        env:
          CUDA_LABEL: ${{ inputs.cuda-label }}
          PY_VERSION: ${{ inputs.python-version }}
          WHEEL_INDEX_URL: ${{ inputs.wheel-index-url }}
          HEAD_DATE: ${{ steps.head.outputs.date_ymd }}
        run: |
          set -euo pipefail
          # TODO: Add a sleep timer to check & pull the wheel with max timeout of 6 hours
          py_short="${PY_VERSION//./}"
          # PEP 503 simple-index hrefs encode '+' as '%2B':
          #   torch-<ver>.dev<YYYYMMDD>%2B<cu>-cp<py>-cp<py>-win_amd64.whl
          pattern="torch-[^/\"]+\.dev${HEAD_DATE}%2B${CUDA_LABEL}-cp${py_short}-cp${py_short}-win_amd64\.whl"
          url=$(curl -fsSL --connect-timeout 30 --max-time 120 "$WHEEL_INDEX_URL" \
            | grep -oE 'href="[^"]+"' \
            | sed -E 's/^href="(.+)"$/\1/' \
            | grep -E "${pattern}(#|$)" \
            | head -n1 || true)
          # download.pytorch.org's simple index always emits absolute hrefs,
          # so no path normalisation is needed - just strip the PEP 503
          # `#sha256=...` fragment.
          url="${url%%#*}"
          if [ -z "$url" ]; then
            echo "::error::No nightly wheel for date=${HEAD_DATE} cuda=${CUDA_LABEL} cp=${py_short} at ${WHEEL_INDEX_URL}. The wheel for the checked-out pytorch commit is not yet published." >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Resolved wheel: $url"

      - name: Install PyTorch
        shell: bash
        env:
          WHEEL_URL: ${{ steps.wheel.outputs.url }}
        run: |
          set -euo pipefail
          if [ -n "$WHEEL_URL" ]; then
            echo "pip install $WHEEL_URL"
            python -m pip install "$WHEEL_URL"
          else
            wheel=$(ls -1 artifact/*.whl | head -n1)
            echo "pip install $wheel"
            python -m pip install "$wheel"
          fi
          python -c "import torch; print('torch', torch.__version__, 'cuda', torch.version.cuda); assert torch.cuda.is_available()"

      # Seed our own test-time stats into pytorch's .additional_ci_files so
      # run_test.py shards deterministically from data we control instead of
      # downloading test-infra stats (or falling back to round-robin). All 5
      # shards read the same committed JSON, so the sharding is consistent.
      - name: Seed test-time stats (deterministic sharding)
        shell: bash
        run: |
          set -euo pipefail
          python "${GITHUB_WORKSPACE}/oot/scripts/test-stats/seed_test_stats.py" \
            --pytorch-root "${{ env.PT_ROOT }}"

      - name: Start runner diagnostics
        id: diag
        uses: ./oot/.github/actions/start-runner-diagnostics

      # === TEMP-DEBUG: run a targeted subset instead of the full suite
      # === (`bash .ci/pytorch/win-test.sh`). Two goals:
      # ===  - profiler/test_cpp_thread: known-flaky on win-cuda; its
      # ===    profiler-handler registration throws "External init callback
      # ===    must run in same thread as registerClient", then passes on
      # ===    rerun - a LIVE rerun fail->pass case to confirm the summary
      # ===    parser reconciles it (green shard, not listed in summary).
      # ===  - test_cpp_extensions_*: the setuptools/ninja/nvcc/cl builds
      # ===    that emit the deep object/dep paths, to confirm the C:\pt
      # ===    relocation fixed the C1083 / "Could not open output file"
      # ===    MAX_PATH failures - in minutes instead of hours.
      #
      # This MUST run through `setup_pytorch_env.bat` first. A previous
      # attempt invoked `python test/run_test.py` from a bare bash shell and
      # got "0 tests / 0 reports": without that script the MSVC toolchain
      # (vcvarsall x64 + DISTUTILS_USE_SDK), CUDA on PATH, the conda env that
      # actually holds torch, and PYTHONPATH=build are all missing, so every
      # cpp_extension build and test_cpp_thread's cpp_extension.load() fails
      # at build/import time. Those die *before* any test runs, so no JUnit
      # XML is written (run_test.py's tests default to --save-xml only once
      # they reach common_utils) - the summary then sees 0 reports and the
      # build-error text doesn't match the parser's failure markers, so it
      # reports "all passed". Running setup_pytorch_env.bat (exactly what
      # win-test.sh's per-shard .bats do) gives the real toolchain, so the
      # builds succeed (validating the C:\pt MAX_PATH fix) and tests emit XML.
      #
      # We call run_test.py directly with --include (no --shard) instead of
      # win-test.sh so the whole targeted set runs on this single shard and
      # we skip win-test.sh's other per-shard .bats (test_libtorch /
      # test_custom_* build & run C++ artifacts that don't exist in a
      # wheel-only test job and would fail spuriously).
      #
      # cmd (not bash) so the env that setup_pytorch_env.bat sets in-process
      # (vcvars, CUDA, conda, DISTUTILS_USE_SDK) persists into run_test.py.
      #
      # The checkout was relocated to C:\pt (see "Relocate pytorch checkout")
      # so this working directory - and every object/dep path the builds
      # derive from it - stays well under MAX_PATH. No subst/drive aliasing
      # is needed (and would not work: setuptools' realpath() canonicalises
      # aliases back to the long physical path).
      #
      # === To revert to the full suite: delete this whole step and restore a
      # === bash step running `bash .ci/pytorch/win-test.sh` (tee'd into
      # === test/test-reports/run_test_shard${SHARD_NUMBER}.log), with env
      # === SHARD_NUMBER/NUM_TEST_SHARDS/TEST_CONFIG/PYTORCH_FINAL_PACKAGE_DIR.
      - name: Run PyTorch Windows test suite
        shell: cmd
        working-directory: ${{ env.PT_ROOT }}
        env:
          TEST_CONFIG: ${{ inputs.test-config }}
          PYTORCH_FINAL_PACKAGE_DIR: ${{ github.workspace }}/artifact
          # ---- GH context useful for log correlation + stats hooks
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.client_payload.pr_number || '' }}
          SHA1: ${{ github.event.pull_request.head.sha || github.event.client_payload.head_sha || github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          @echo on
          rem ---- env win-test.sh exports before calling its per-shard .bats
          set "SCRIPT_HELPERS_DIR=%CD%\.ci\pytorch\win-test-helpers"
          set "TMP_DIR=%CD%\build\win_tmp"
          set "TMP_DIR_WIN=%CD%\build\win_tmp"
          set "PROJECT_DIR=%CD%"
          set "PROJECT_DIR_WIN=%CD%"
          set "TEST_DIR=%CD%\test"
          set "PYTORCH_TESTING_DEVICE_ONLY_FOR=cuda"
          rem ---- Leave USE_CUDA at the job default (1). win-test.sh only
          rem ---- forces USE_CUDA=0 for the force_on_cpu / openreg configs,
          rem ---- never the CUDA wheel test, which runs with USE_CUDA=1. With
          rem ---- USE_CUDA=1 setup_pytorch_env.bat prepends the system CUDA
          rem ---- v%CUDA_VERSION% bin onto PATH; the wheel's torch needs that
          rem ---- directory to resolve its CUDA DLLs when it is imported from
          rem ---- the copied %TMP_DIR_WIN%\build\torch tree. An earlier
          rem ---- `set USE_CUDA=0` here removed that dir from PATH and made
          rem ---- `import torch` access-violate (0xC0000005 -> 0 tests ran).
          if not exist "%TMP_DIR%\build\torch" mkdir "%TMP_DIR%\build\torch"
          if not exist "%CD%\test\test-reports" mkdir "%CD%\test\test-reports"

          rem ---- real toolchain (vcvars x64, DISTUTILS_USE_SDK, conda)
          call "%SCRIPT_HELPERS_DIR%\setup_pytorch_env.bat"
          if errorlevel 1 exit /b 1

          pushd test
          python run_test.py --verbose --include profiler/test_cpp_thread test_cpp_extensions_aot_ninja test_cpp_extensions_aot_no_ninja test_cpp_extensions_jit test_cpp_extensions_stream_and_event
          set "RT_RC=%errorlevel%"
          popd
          exit /b %RT_RC%

      - name: Stop runner diagnostics
        if: always()
        uses: ./oot/.github/actions/stop-runner-diagnostics
        with:
          output-dir: ${{ steps.diag.outputs.output-dir }}

      # Parse this shard's JUnit reports and render the failing test names
      # straight into the shard's own step summary. Read-only and best-
      # effort: it never changes the shard's pass/fail status (the test
      # step above already owns that), so it runs even when the test step
      # errored. The orchestrator-level `test-summary` job aggregates which
      # cells/shards failed; this gives the per-shard test-name detail.
      - name: Summarize failed tests (this shard)
        if: always()
        shell: bash
        run: |
          python "${GITHUB_WORKSPACE}/oot/scripts/test-summary/parse_failures.py" \
            --reports-dir "${{ env.PT_ROOT }}/test" \
            --title "Failed tests - ${{ inputs.build-environment }} - ${{ inputs.python-label }}/${{ inputs.cuda-label }} - ${{ inputs.arch-name }} - shard ${{ matrix.shard }}/5" \
            >> "$GITHUB_STEP_SUMMARY"

      # DISABLED: GitHub Actions artifact upload. Re-enable by restoring
      # the original `if: always()` condition below.
      - name: Upload runner diagnostics
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: runner-diagnostics-${{ inputs.build-environment }}-${{ inputs.python-label }}-${{ inputs.cuda-label }}-shard${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.diag.outputs.output-dir }}/**
          if-no-files-found: warn
          retention-days: 14

      # Archive the raw test-reports tree (JUnit XML plus any crash / log
      # files the harness drops there). upload-artifact@v4 stores the folder
      # and serves it as a single `<name>.zip` on download. The name is unique
      # per cell+shard+run+attempt so the 5 parallel shards never collide
      # (v4 forbids two jobs uploading the same artifact name).
      - name: Upload test-reports archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ inputs.build-environment }}-${{ inputs.python-label }}-${{ inputs.cuda-label }}-${{ inputs.arch-name }}-shard${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.PT_ROOT }}/test/test-reports/**
          if-no-files-found: warn
          retention-days: 14
