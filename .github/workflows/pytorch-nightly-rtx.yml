name: pytorch-nightly-rtx

# Nightly CI for pytorch/pytorch on self-hosted Windows NVIDIA RTX runners.
# Every job runs on a self-hosted runner provided by NVIDIA infrastructure;
# this workflow performs zero work on GitHub-hosted ("cloud") runners.
#
# Shape:
#
#   build  matrix( python x cuda )            one multi-arch wheel per cell
#       |   each cell records its built SHA into the wheel artifact
#       |
#       +---> rtx-40x0-test  matrix( python x cuda )   sm89  / Ada
#       +---> rtx-50x0-test  matrix( python x cuda )   sm120 / Blackwell
#
# The upstream pytorch/pytorch PR #176678 covers a single matrix cell
# (python 3.12, cuda 12.8). This internal repo deliberately expands the
# matrix so we can catch regressions across multiple Python and CUDA
# toolkit combinations before they show up upstream.
#
# Build/test logic itself comes from PyTorch's in-tree `.ci/pytorch/*.sh`
# scripts; this repo holds only the workflow wiring.
#
# Triggers:
#   - `schedule`            - daily at 12:00 UTC
#   - `workflow_dispatch`   - manual, with knobs for ref / test subset
#   - `repository_dispatch` - RFC-0050 Relay Server forwards `pytorch-pr-trigger`

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      pytorch-ref:
        description: "pytorch/pytorch ref to build (branch / tag / SHA)."
        required: false
        default: "nightly"
      test-architectures:
        description: "Comma-separated subset of sm89,sm120 to test against (build is always multi-arch)."
        required: false
        default: "sm89,sm120"
  repository_dispatch:
    types: [pytorch-pr-trigger]

concurrency:
  group: pytorch-nightly-rtx-${{ github.event.client_payload.pr_number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

permissions:
  contents: read
  actions: read

jobs:
  # -------------------------------------------------------------------
  # Build: one multi-arch wheel per (python x cuda) matrix cell.
  # Each cell records the exact pytorch SHA it built into the wheel
  # artifact, so the paired test cell can pin its checkout to it.
  # -------------------------------------------------------------------
  build:
    name: build (multi-arch / ${{ matrix.python.label }} / ${{ matrix.cuda.label }})
    strategy:
      fail-fast: false
      matrix:
        python:
          - { version: "3.12", label: "py312" }
          - { version: "3.13", label: "py313" }
        cuda:
          - { version: "13.0", label: "cu130" }
          - { version: "13.2", label: "cu132" }
    uses: ./.github/workflows/_rtx-build.yml
    with:
      runner-base: rtx-build
      python-version: ${{ matrix.python.version }}
      python-label: ${{ matrix.python.label }}
      cuda-version: ${{ matrix.cuda.version }}
      cuda-label: ${{ matrix.cuda.label }}
      cuda-arch-list: "8.9;12.0"
      build-environment: win-rtx-cuda
      pytorch-ref: ${{ inputs.pytorch-ref || 'nightly' }}

  # -------------------------------------------------------------------
  # Test: each architecture (sm89, sm120) fans out across the full
  # (python x cuda) matrix, reusing the wheel produced by `build`. The
  # pytorch source tree is checked out at the SHA carried in the wheel
  # artifact so source <-> wheel never drift.
  # -------------------------------------------------------------------
  rtx-40x0-test:
    name: test sm89 / RTX 40x0 (${{ matrix.python.label }} / ${{ matrix.cuda.label }})
    needs: build
    if: contains(inputs.test-architectures || 'sm89,sm120', 'sm89') || github.event_name != 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python:
          - { version: "3.12", label: "py312" }
          - { version: "3.13", label: "py313" }
        cuda:
          - { version: "13.0", label: "cu130" }
          - { version: "13.2", label: "cu132" }
    uses: ./.github/workflows/_rtx-test.yml
    with:
      runner-base: rtx-40x0-test
      python-version: ${{ matrix.python.version }}
      python-label: ${{ matrix.python.label }}
      cuda-version: ${{ matrix.cuda.version }}
      cuda-label: ${{ matrix.cuda.label }}
      build-environment: win-rtx-sm89
      wheel-artifact: pytorch-wheel-win-rtx-cuda-${{ matrix.python.label }}-${{ matrix.cuda.label }}-${{ github.run_id }}-${{ github.run_attempt }}

  rtx-50x0-test:
    name: test sm120 / RTX 50x0 (${{ matrix.python.label }} / ${{ matrix.cuda.label }})
    needs: build
    if: contains(inputs.test-architectures || 'sm89,sm120', 'sm120') || github.event_name != 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python:
          - { version: "3.12", label: "py312" }
          - { version: "3.13", label: "py313" }
        cuda:
          - { version: "13.0", label: "cu130" }
          - { version: "13.2", label: "cu132" }
    uses: ./.github/workflows/_rtx-test.yml
    with:
      runner-base: rtx-50x0-test
      python-version: ${{ matrix.python.version }}
      python-label: ${{ matrix.python.label }}
      cuda-version: ${{ matrix.cuda.version }}
      cuda-label: ${{ matrix.cuda.label }}
      build-environment: win-rtx-sm120
      wheel-artifact: pytorch-wheel-win-rtx-cuda-${{ matrix.python.label }}-${{ matrix.cuda.label }}-${{ github.run_id }}-${{ github.run_attempt }}
