name: internal-validation

# Cheap PR-time check: ensures every workflow YAML in `.github/workflows` is
# syntactically valid and matches the GitHub Actions schema. Catches broken
# workflows before they reach a real build / test runner.
#
# Runs on the same self-hosted Windows runner pool as the build jobs.
# `rtx-build` is used because every pre-prepped image in that pool already
# has Python and Git Bash on PATH; only the `rtx-build` label is required
# here, matrix-specific labels (py3xx / cu1xx) are intentionally omitted so
# any free build runner can pick this job up.

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"
  workflow_dispatch:
  # repository_dispatch:


concurrency:
  group: internal-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml:
    name: validate workflow YAML
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install validators
        shell: bash
        run: |
          python -m pip install --user --quiet "PyYAML>=6" "check-jsonschema>=0.29"

      - name: YAML syntax check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys, pathlib, yaml
          bad = 0
          for p in pathlib.Path(".github").rglob("*.yml"):
              try:
                  yaml.safe_load(p.read_text(encoding="utf-8"))
                  print(f"OK   {p}")
              except yaml.YAMLError as e:
                  print(f"FAIL {p}: {e}", file=sys.stderr)
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      - name: Validate workflow schema
        shell: bash
        run: |
          check-jsonschema --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml
