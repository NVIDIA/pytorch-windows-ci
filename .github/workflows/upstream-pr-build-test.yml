name: upstream-pr-build-test

# PR validation pipeline. Triggered by the upstream Relay Server every
# time a `pytorch/pytorch` PR is opened, synchronised, or reopened:
# builds the PR head into a Windows CUDA wheel via `_rtx-build.yml`,
# then runs the matching test slice against that exact wheel via
# `_rtx-test.yml`. Once `pytorch/actions/report-ci-result@v1` is
# published, the outcome will be echoed back to the relay so the PR
# can carry an RTX CI status.
#
# Dispatch payload (RFC-0050 flat schema, same as the relay sends):
#   github.event.action                          'pytorch-pr-trigger'
#   github.event.client_payload.pr_number        int, > 0
#   github.event.client_payload.head_sha         40-char hex
#   github.event.client_payload.base_ref         default 'main'
#
# `_rtx-build.yml`'s dispatch arm passes `client_payload.head_sha`
# directly to `pytorch/actions/checkout-pr@v1` to land on the exact
# commit being validated, so no extra plumbing is needed here.
#
# Single fixed config (no matrix): py312 + cu132, tested on sm120 /
# RTX 50x0 runners. This is deliberately a smoke configuration - if/when
# wider PR coverage is needed, mirror the nightly orchestrator's matrix
# shape from `nightly-source-build-test.yml`.

on:
  repository_dispatch:
    types: [pytorch-pr-trigger]

# One run per PR; newer pushes to the same PR cancel any in-flight run
# so we always validate the latest head.
concurrency:
  group: upstream-pr-${{ github.event.client_payload.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ===========================================================================
  # Observability: render the relay payload (table + full event JSON)
  # into the run's step summary so PR triagers can see exactly what was
  # dispatched.
  # ===========================================================================
  inspect-dispatch:
    if: github.event_name == 'repository_dispatch'
    name: inspect upstream PR dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pytorch-oot-internal (for composite actions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Inspect repository_dispatch event
        uses: ./.github/actions/inspect-dispatch-event

  # ===========================================================================
  # Build one multi-arch wheel (sm89 + sm120) on py312 / cu132.
  # `_rtx-build.yml` checks out the PR head via
  # `pytorch/actions/checkout-pr@v1` using `client_payload.head_sha`,
  # builds with `tools/pytorch-build/Build-PyTorchWindows.ps1` (the native
  # PowerShell clean-build driver, opted in via `use-powershell-build`), and
  # publishes wheel + built_pytorch_sha.txt under the wheel-artifact
  # name shared with the test job below.
  # ===========================================================================
  build:
    name: wheel-py312-cu132-build
    # needs: inspect-dispatch
    uses: ./.github/workflows/_rtx-build.yml
    with:
      runner-base: rtx-build
      python-version: "3.12"
      python-label: py312
      pytorch-ref: ${{ github.event.client_payload.payload.pull_request.head.sha || 'main' }}
      cuda-version: "13.2"
      cuda-label: cu132
      cuda-arch-list: "8.9;12.0"
      build-environment: win-rtx-pr
      use-powershell-build: true
      wheel-artifact: wheel-py312-cu132-${{ github.run_id }}-${{ github.run_attempt }}

  # ===========================================================================
  # Test the just-built wheel on sm120 / RTX 50x0. `_rtx-test.yml`
  # downloads the wheel artifact, pins its pytorch checkout to the SHA
  # recorded next to that wheel, and runs the test harness across its
  # internal 5-shard fanout.
  # ===========================================================================
  test:
    name: wheel-py312-cu132-sm120-test
    needs: build
    uses: ./.github/workflows/_rtx-test.yml
    with:
      runner-base: rtx-50x0-test
      python-version: "3.12"
      python-label: py312
      cuda-version: "13.2"
      cuda-label: cu132
      pytorch-ref: ${{ github.event.client_payload.payload.pull_request.head.sha || 'main' }}
      cuda-arch-list: "12.0"
      arch-name: sm120
      build-environment: win-rtx-pr-sm120
      test-config: "default"
      # Must match the build's `wheel-artifact` exactly.
      wheel-artifact: wheel-py312-cu132-${{ github.run_id }}-${{ github.run_attempt }}

  # ===========================================================================
  # Post-test rollup. Runs once after the test shards settle and renders a
  # consolidated table of the test jobs that failed (with direct log links)
  # into the run's step summary. Per-test-name detail lives in each shard's
  # own summary (see `_rtx-test.yml`). Informational only: `if: always()`
  # so it runs even when tests fail, and it never reports a non-zero status
  # of its own - the test job already carries red/green.
  # ===========================================================================
  test-summary:
    name: test-summary
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pytorch-oot-internal (for summary script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Aggregate failed test jobs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs" \
            -q '.jobs[]' | jq -s '.' > jobs.json
          python3 scripts/test-summary/aggregate_failures.py \
            --jobs-json jobs.json \
            --title "PyTorch test summary (run ${{ github.run_id }})" \
            >> "$GITHUB_STEP_SUMMARY"
