name: lint

# Cheap PR-time check:
#   * `yaml`       - every workflow YAML in `.github/workflows` is syntactically
#                    valid and matches the GitHub Actions schema.
#   * `powershell` - the vendored WoA build/test library under `tools/woa-build`
#                    parses and passes PSScriptAnalyzer (errors fail the job).
# Catches broken workflows / scripts before they reach a real build/test runner.
# Both jobs run on ubuntu-latest (has python + pwsh preinstalled).

on:
  pull_request:
    paths:
      - ".github/**"
      - "tools/woa-build/**"
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "tools/woa-build/**"
  workflow_dispatch:
  # repository_dispatch:


concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml:
    name: validate workflow YAML
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          show-progress: false

      - name: Install validators
        shell: bash
        run: |
          python -m pip install --user --quiet "PyYAML>=6" "check-jsonschema>=0.29"

      - name: YAML syntax check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys, pathlib, yaml
          bad = 0
          for p in pathlib.Path(".github").rglob("*.yml"):
              try:
                  yaml.safe_load(p.read_text(encoding="utf-8"))
                  print(f"OK   {p}")
              except yaml.YAMLError as e:
                  print(f"FAIL {p}: {e}", file=sys.stderr)
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      - name: Validate workflow schema
        shell: bash
        run: |
          check-jsonschema --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml

  powershell:
    name: lint PowerShell (woa-build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          show-progress: false

      # Syntax gate: parse every .ps1 with the PowerShell parser. Guaranteed to
      # catch a broken re-vendor or a bad entrypoint edit regardless of platform.
      - name: Parse-check all .ps1
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem -Recurse -Filter *.ps1 tools/woa-build | ForEach-Object {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              $bad++
              Write-Host "::error file=$($_.FullName)::$($errors.Count) parse error(s)"
              $errors | ForEach-Object { Write-Host "  $($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($bad -gt 0) { throw "$bad file(s) with parse errors" }

      # Style/quality gate: PSScriptAnalyzer. Errors fail the job; warnings are
      # surfaced as PR annotations but do not block (the vendored code is authored
      # against PSSA and carries targeted suppressions).
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $res = @(Invoke-ScriptAnalyzer -Path tools/woa-build -Recurse `
            -Settings tools/woa-build/PSScriptAnalyzerSettings.psd1)
          if ($res.Count -gt 0) {
            $res | Sort-Object Severity, ScriptName, Line |
              Format-Table Severity, RuleName, ScriptName, Line, Message -AutoSize |
              Out-String -Width 240 | Write-Host
          }
          foreach ($w in @($res | Where-Object Severity -eq 'Warning')) {
            Write-Host "::warning file=$($w.ScriptPath),line=$($w.Line)::[$($w.RuleName)] $($w.Message)"
          }
          $errs = @($res | Where-Object Severity -eq 'Error')
          foreach ($e in $errs) {
            Write-Host "::error file=$($e.ScriptPath),line=$($e.Line)::[$($e.RuleName)] $($e.Message)"
          }
          if ($errs.Count -gt 0) { throw "PSScriptAnalyzer reported $($errs.Count) error(s)" }
          Write-Host "PSScriptAnalyzer: no errors ($($res.Count) finding(s) total)."
