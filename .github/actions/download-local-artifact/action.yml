name: "Download artifact from internal storage"
description: >
  Fetch a zip from the on-prem artifact server and unzip it. Used as
  the primary artifact transport in `_rtx-test.yml`, with
  `actions/download-artifact` kept as an automatic fallback. Pair with
  `upload-local-artifact` on the producer side.

inputs:
  artifact-name:
    description: "Base filename of the zip on the server (`.zip` is appended)."
    required: true
  dest-dir:
    description: >
      Directory to unzip into. Defaults to `$GITHUB_WORKSPACE` so the
      round-trip with `upload-local-artifact` lands files at the same
      workspace-relative paths the upload step zipped from.
    required: false
    default: ""
  server-url:
    description: >
      Base URL of the artifact server (no trailing slash). No default is
      shipped; pass it explicitly, e.g. from a repository variable such as
      `${{ vars.ARTIFACT_SERVER_URL }}`.
    required: true
  fetch-test-times:
    description: >
      If 'true', also fetch `test-times.zip` and stage it under
      `<dest-dir>/<run_id>/<build-environment>/build-results/.additional_ci_files/`
      (mirrors upstream's sharding-hints layout). Requires `build-environment`
      to be set.
    required: false
    default: "false"
  build-environment:
    description: "Required only when fetch-test-times is 'true'."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Fetch and unzip from internal storage
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        DEST_DIR: ${{ inputs.dest-dir }}
        SERVER_URL: ${{ inputs.server-url }}
        FETCH_TEST_TIMES: ${{ inputs.fetch-test-times }}
        BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
      run: |
        : "${DEST_DIR:=$GITHUB_WORKSPACE}"
        export DEST_DIR
        # Action lives at <repo>/.github/actions/download-local-artifact/,
        # script lives at <repo>/scripts/local-artifact/.
        script_dir="$(cd -- "$GITHUB_ACTION_PATH/../../../scripts/local-artifact" && pwd -P)"
        bash "$script_dir/download.sh"
